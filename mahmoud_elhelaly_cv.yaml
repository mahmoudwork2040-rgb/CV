      - company: Freelance
        position: Data Analyst & BI Consultant
        location: Online
        start_date: 2025-02
        end_date: present
        highlights:
          - Translated complex business requirements into scalable data models and interactive Power BI reports for diverse clients.
          - Streamlined reporting workflows by integrating disparate data sources, reducing manual preparation time by [30%].

    projects:
      - name: Electronics Retail Performance & Forecast 
        link: https://www.youtube.com/watch?v=UiCx9nMZZIU
        highlights:
          - "**Tech Stack:** SQL Server, Power BI, DAX, Excel, Power Query"
          - "**Problem:** Management couldn't identify which specific brands were dragging down overall profitability or failing to meet aggressive sales forecasts."
          - "**Solution:** Built an interactive dashboard with drill-down capabilities to compare two years of historical data against real-time forecast KPIs."
          - "**Impact:** Empowered executive management to **pivot procurement strategies by reducing stock for underperforming brands and negotiating higher volume discounts for brands consistently exceeding 100% of the forecast.**"
      
      - name: Retail Data Warehouse & Strategic Analytics
        link: https://github.com/MGmahmoud/SQL-Data-Warehouse-and-Analytics-Project
        highlights:
          - "Architected an end-to-end Medallion Architecture (Bronze, Silver, Gold) to centralize disparate CSV exports from ERP and CRM systems into a unified source of truth."
          - "Implemented a Star Schema data model optimized for complex analytical queries, reducing report generation time by [70%]."
          - "**Tech Stack:** SQL Server, Dimensional Modeling, Advanced T-SQL, Medalline Archictecture "
          - "**Problem:** Sales data was siloed in inconsistent CSV files with high duplication, making it impossible to generate reliable monthly reports on customer or product trends."
          - "**Solution:** Engineered an automated ETL pipeline for data deduplication and cleansing, transforming raw files into high-performance Gold-layer data marts."
          - "**Impact:** Delivered advanced analytics including **RFM Customer Segmentation and Product Analysis**, allowing the marketing team to target top-tier customers and optimize product catalogs based on revenue contribution."
          
      - name: HR Early Warning System (Employee Attrition)
        link: https://www.kaggle.com/code/mahmoudelhelaly/ibm-employee-attrition-analysis
        highlights:
          - "Developed a predictive analytics solution to quantify and mitigate high employee turnover rates using a dataset of 1,400+ employee records."
          - "Engineered a high-performance classification pipeline reaching 87% accuracy using XGBoost and Random Forest models."
          - "**Tech Stack:** Python (Pandas, Scikit-Learn), Seaborn, XGBoost, Predictive Modeling"
          - "**Problem:** The company suffered from high attrition but lacked the quantitative tools to identify root causes or predict which employees were at risk of leaving."
          - "**Solution:** Conducted deep-dive EDA to identify 'High-Risk' segments (Sales and Lab Techs), uncovering that low salary and travel frequency were the primary churn drivers."
          - "**Impact:** Built a proactive attrition prediction model that functions as an **early warning system**, allowing HR to implement targeted retention strategies (salary adjustments and travel caps) before high-value employees resign."
      
      - name: Enterprise Banking ETL & Dimensional Modeling
        link: https://github.com/MGmahmoud/Bank_DWH_ETL
        highlights:
          - "Architected a high-availability ETL framework using Informatica PowerCenter to offload reporting workloads from core banking production systems."
          - "Engineered a robust Dimensional Model (Star Schema) in Oracle Database, optimizing complex transactional data for rapid regulatory and monthly reporting."
          - "**Tech Stack:** Informatica PowerCenter, Oracle SQL, PL/SQL, Dimensional Modeling"
          - "**Problem:** Monthly transaction reporting was causing significant performance degradation on the core banking system, while poor data quality led to unreliable financial statements."
          - "**Solution:** Built an automated ETL pipeline with built-in data validation logic to clean and move data into a dedicated reporting layer."
          - "**Impact:** Improved reporting team efficiency by **10X** and eliminated production system downtime during month-end closing, ensuring 100% data accuracy for financial audits."
    
    tech_stack:
      - label: Business Intelligence & Tools
        details: Power BI, DAX, Tableau, Excel, SSIS, SSRS, SSAS, Data Warehousing, ETL/ELT, Data Modeling, Informatica Power Center
      - label: Data Engineering
