        highlights:
          - Built scalable ETL pipelines using Spark, Kafka, and Hadoop.
          - Performed EDA and feature engineering for analytical use cases.
          - Deployed data workflows on AWS EC2 and S3.

    projects:
      - name: GoldTracker EGP
        link: https://github.com/OssamaTaha/gold-tracker-egp
        highlights:
          - "**Tech Stack:** Python, Streamlit, Plotly, SQLite, BeautifulSoup"
          - "**Problem:** Lack of real-time, consolidated gold price data and analytics in the Egyptian market."
          - "**Solution:** Built an automated ETL pipeline and interactive dashboard with AI-driven buy/sell signals."
          - "**Repository:** [github.com/OssamaTaha/gold-tracker-egp](https://github.com/OssamaTaha/gold-tracker-egp)"
      
      - name: Sales Reporting ETL & Data Warehouse
        link: https://github.com/OssamaTaha/reportingSystem
        highlights:
          - "**Tech Stack:** Python, Dolt, SQL, Pandas, Dash"
          - "**Problem:** Fragmented sales data across multiple files making reporting slow and error-prone."
          - "**Solution:** Engineered a robust ETL pipeline and version-controlled data warehouse, ensuring data integrity."
          - "**AI Feature:** Developed a local AI chatbot using open-source Hugging Face models to enable secure, natural language querying of company data."
#          - "**Repository:** [github.com/OssamaTaha/reportingSystem](https://github.com/OssamaTaha/reportingSystem)"

      - name: Order Management Bot
        link: https://github.com/OssamaTaha/Order-Management-Bot
        highlights:
          - "**Tech Stack:** Python, Telegram API, SQLite, Tesseract OCR"
          - "**Problem:** Manual order processing on social media was time-consuming and inefficient."
          - "**Solution:** Developed a modular bot with OCR for product codes, automating order intake and management."
          - "**Repository:** [github.com/OssamaTaha/Order-Management-Bot](https://github.com/OssamaTaha/Order-Management-Bot)"

      - name: SIC Fraud Detection
        link: https://github.com/OssamaTaha/SIC_FraudDetection
        highlights:
          - "**Tech Stack:** Python, Scikit-learn, Pandas, Jupyter"
          - "**Problem:** Identifying fraudulent transactions in a large dataset with high precision."
          - "**Solution:** Implemented a machine learning model with extensive feature engineering, achieving high detection accuracy."
          - "**Repository:** [github.com/OssamaTaha/SIC_FraudDetection](https://github.com/OssamaTaha/SIC_FraudDetection)"

    tech_stack:
